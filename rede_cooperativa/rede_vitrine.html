<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Comunitária - Rede Cooperativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/rede_cooperativa.css">
    <link rel="stylesheet" href="style/rede_vitrine.css">
</head>
<body>

    <header class="rede-header">
        <div class="header-left">
            <a href="rede_cooperativa.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Painel Geral</a>
            <h1><i class="fa-solid fa-rectangle-ad"></i> Vitrine Comunitária</h1>
        </div>
        <div class="user-profile">
            <div class="avatar" id="user-avatar">...</div>
            <span id="user-display-name">Carregando...</span>
        </div>
    </header>

    <main class="vitrine-container animacao-entrada">
        <section class="vitrine-top-bar">
            <div>
                <h2>Promova o seu Negócio na Rede</h2>
                <p>Veja os produtos e serviços dos seus parceiros de rede ou publique as suas ofertas para vender mais rápido.</p>
            </div>
            <button class="btn-anunciar" id="btn-abrir-anuncio">
                <i class="fa-solid fa-plus"></i> Publicar Produto/Serviço
            </button>
        </section>

        <section class="vitrine-grid" id="vitrine-produtos">
            </section>
    </main>

    <script src="../script/script.js"></script>
    <script src="script/rede_vitrine.js"></script>
</body>
</html>
