<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Gradiente que une tecnologia e humanismo -->
    <linearGradient id="gradienteHumanista" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- ISOTIPO: Símbolo Orgânico / Conexão Humana de Gestão -->
  <g transform="translate(20, 25)">
    <!-- Linhas fluidas que simulam crescimento e comunidade -->
    <path d="M30,80 Q45,40 60,80 T90,80" fill="none" stroke="url(#gradienteHumanista)" stroke-width="8" stroke-linecap="round"/>
    <path d="M45,65 Q60,25 75,65" fill="none" stroke="url(#gradienteHumanista)" stroke-width="6" stroke-linecap="round"/>
    <!-- Pontos de união/nós inteligentes -->
    <circle cx="30" cy="80" r="7" fill="#4f46e5" />
    <circle cx="60" cy="80" r="7" fill="#059669" />
    <circle cx="90" cy="80" r="7" fill="#4f46e5" />
    <circle cx="60" cy="22" r="8" fill="url(#gradienteHumanista)" />
  </g>

  <!-- TEXTO: Identidade SmartGest -->
  <g transform="translate(140, 75)">
    <!-- Nome Principal -->
    <text font-family="'Plus Jakarta Sans', 'Montserrat', 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="#0f172a">Smart<tspan font-weight="400" fill="#4f46e5">Gest</tspan></text>
    
    <!-- Slogan / Subtítulo -->
    <text x="2" y="32" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-size="12" font-weight="600" letter-spacing="6" fill="#64748b">GESTÃO INTELIGENTE</text>
  </g>
</svg>
