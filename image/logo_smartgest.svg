<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- O nosso gradiente humanista com dominância de azuis -->
    <linearGradient id="gradienteAzulIsotipo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af" /> <!-- Azul Royal Profundo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Azul Ciano Fluido -->
    </linearGradient>
  </defs>

  <!-- SÍMBOLO SMARTGEST (Sem texto) -->
  <g transform="translate(15, 20)">
    <!-- Linhas orgânicas de conexão -->
    <path d="M30,80 Q45,40 60,80 T90,80" fill="none" stroke="url(#gradienteAzulIsotipo)" stroke-width="8" stroke-linecap="round"/>
    <path d="M45,65 Q60,25 75,65" fill="none" stroke="url(#gradienteAzulIsotipo)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Nós inteligentes da rede -->
    <circle cx="30" cy="80" r="7" fill="#1e40af" />
    <circle cx="60" cy="80" r="7" fill="#06b6d4" />
    <circle cx="90" cy="80" r="7" fill="#1e40af" />
    <circle cx="60" cy="22" r="8" fill="url(#gradienteAzulIsotipo)" />
  </g>
</svg>
