<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 150" width="100%" height="100%">
  <defs>
    <!-- Gradiente com dominância de Azuis -->
    <linearGradient id="gradienteAzulDominante" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af" /> <!-- Azul Royal Profundo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Azul Ciano Fluido -->
    </linearGradient>
  </defs>

  <!-- ISOTIPO: Conexão Humana e Gestão -->
  <g transform="translate(20, 25)">
    <path d="M30,80 Q45,40 60,80 T90,80" fill="none" stroke="url(#gradienteAzulDominante)" stroke-width="8" stroke-linecap="round"/>
    <path d="M45,65 Q60,25 75,65" fill="none" stroke="url(#gradienteAzulDominante)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="30" cy="80" r="7" fill="#1e40af" />
    <circle cx="60" cy="80" r="7" fill="#06b6d4" />
    <circle cx="90" cy="80" r="7" fill="#1e40af" />
    <circle cx="60" cy="22" r="8" fill="url(#gradienteAzulDominante)" />
  </g>

  <!-- TEXTO: SmartGest -->
  <g transform="translate(140, 75)">
    <!-- Se fores usar em fundo escuro, podes mudar o fill do "Smart" de #0f172a para #ffffff também -->
    <text font-family="'Plus Jakarta Sans', 'Montserrat', 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="#0f172a">Smart<tspan font-weight="400" fill="#1e40af">Gest</tspan></text>
    
    <!-- Slogan: Cor Branca, tamanho aumentado de 12 para 14, e ajuste na posição Y -->
    <text x="2" y="35" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-size="14" font-weight="700" letter-spacing="5" fill="#ffffff">GESTÃO INTELIGENTE</text>
  </g>
</svg>
